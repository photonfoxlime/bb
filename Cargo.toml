[workspace]
members = ["garden/*", "ui"]

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
# derive
derive_more = { version = "2.0", features = ["from"] }
impl-tools = "0.11"
educe = "0.6.0"

# error handling
thiserror = "2.0"
anyhow = "1.0"

# lexer and parser
logos = "0.15"
lalrpop-util = "0.22"
lalrpop = "0.22"

# serde
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# text
indoc = "2.0"

# async
tokio.version = "1.45"
tokio.features = ["full"]
async-std = "1.13"

# ui
iced.git = "https://github.com/iced-rs/iced.git"
iced.branch = "master"
iced_test = "0.0.0"

# web
web-sys = "*"
wasmtimer = "0.4"

[package]
name = "bb"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
logos = { workspace = true }
lalrpop-util = { workspace = true }
derive_more = { workspace = true }
impl-tools = { workspace = true }
educe = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

[build-dependencies]
lalrpop = { workspace = true }

[dev-dependencies]
indoc = { workspace = true }
