indoc = "2.0"

tokio = "1.45"
async-std = "1.13"
iced = "0.13"
iced_test = "0.0.0"

web-sys = "*"
wasmtimer = "0.4"

[package]
name = "bb"
version = { workspace = true }
edition = { workspace = true }

[dependencies]
