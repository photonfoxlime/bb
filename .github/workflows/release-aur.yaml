name: Release to AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: aur-${{ github.repository }}
  cancel-in-progress: false

jobs:
  aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    env:
      AUR_PKG: blooming-blockery-bin
      LINUX_ASSET: blooming-blockery-x86_64-unknown-linux-gnu.tar.xz

    steps:
      - name: Install deps (Arch)
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archlinux-keyring ca-certificates
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed base-devel git openssh jq github-cli

      - name: Determine release tag for this workflow_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          TAG="$(gh api "repos/${REPO}/releases?per_page=50" --jq \
            "[.[] | select(.target_commitish == \"${SHA}\")][0].tag_name")"

          if [ "${TAG}" = "null" ] || [ -z "${TAG}" ]; then
            echo "No release found with target_commitish == ${SHA}"
            gh api "repos/${REPO}/releases?per_page=10" --jq '.[] | {tag_name, target_commitish, published_at}'
            exit 1
          fi

          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "PKGVER=${TAG#v}" >> "$GITHUB_ENV"
          echo "Detected release tag: ${TAG}"

      - name: Download Linux asset + compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${TAG}" --repo "${REPO}" --pattern "${LINUX_ASSET}" --dir dist
          test -f "dist/${LINUX_ASSET}"

          SHA256="$(sha256sum "dist/${LINUX_ASSET}" | awk '{print $1}')"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"

      - name: Prepare SSH for AUR push (no indentation pitfalls)
        run: |
          set -euo pipefail

          SSH_DIR="$HOME/.ssh"
          KEY="$SSH_DIR/id_ed25519"
          KNOWN="$SSH_DIR/known_hosts"
          CFG="$SSH_DIR/config"

          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > "$KEY"
          chmod 600 "$KEY"

          ssh-keyscan -t rsa,ecdsa,ed25519 -H aur.archlinux.org > "$KNOWN"
          chmod 644 "$KNOWN"

          # Write config with absolute paths (no ~ expansion issues)
          cat > "$CFG" <<'EOF'
Host aur.archlinux.org
  HostName aur.archlinux.org
  User aur
  IdentityFile __KEY__
  IdentitiesOnly yes
  StrictHostKeyChecking yes
  UserKnownHostsFile __KNOWN__
EOF

          # Substitute placeholders safely
          sed -i "s|__KEY__|$KEY|g" "$CFG"
          sed -i "s|__KNOWN__|$KNOWN|g" "$CFG"
          chmod 600 "$CFG"

          ssh-keygen -F aur.archlinux.org -f "$KNOWN" >/dev/null

      - name: Clone AUR repo
        env:
          GIT_SSH_COMMAND: ssh -F "$HOME/.ssh/config"
        run: |
          set -euo pipefail
          git clone "ssh://aur@aur.archlinux.org/${AUR_PKG}.git" aur

      - name: Update PKGBUILD + regenerate .SRCINFO (makepkg)
        working-directory: aur
        run: |
          set -euo pipefail
          sed -i -E \
            -e "s/^pkgver=.*/pkgver=${PKGVER}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums=.*/sha256sums=('${SHA256}')/" \
            PKGBUILD

          makepkg --printsrcinfo > .SRCINFO

          grep -q "source = https://github.com/.*/releases/download/v${PKGVER}/${LINUX_ASSET}" .SRCINFO

      - name: Commit and push to AUR
        working-directory: aur
        env:
          GIT_SSH_COMMAND: ssh -F "$HOME/.ssh/config"
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update to ${PKGVER}"
          git push
