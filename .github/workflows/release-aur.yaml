name: Release to AUR

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: aur-${{ github.repository }}
  cancel-in-progress: false

jobs:
  aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    env:
      AUR_PKG: blooming-blockery-bin
      LINUX_ASSET: blooming-blockery-x86_64-unknown-linux-gnu.tar.xz

    steps:
      - name: Install deps (Arch)
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm archlinux-keyring ca-certificates
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git openssh jq github-cli

      - name: Determine release tag for this workflow_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          TAG="$(gh api "repos/${REPO}/releases?per_page=50" --jq \
            "[.[] | select(.target_commitish == \"${SHA}\")][0].tag_name")"

          if [ "${TAG}" = "null" ] || [ -z "${TAG}" ]; then
            echo "No release found with target_commitish == ${SHA}"
            gh api "repos/${REPO}/releases?per_page=10" --jq '.[] | {tag_name, target_commitish, published_at}'
            exit 1
          fi

          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "PKGVER=${TAG#v}" >> "$GITHUB_ENV"
          echo "Detected release tag: ${TAG}"

      - name: Download Linux asset + compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p dist

          gh release download "${TAG}" \
            --repo "${REPO}" \
            --pattern "${LINUX_ASSET}" \
            --dir dist

          test -f "dist/${LINUX_ASSET}"

          SHA256="$(sha256sum "dist/${LINUX_ASSET}" | awk '{print $1}')"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"

          echo "PKGVER=${PKGVER}"
          echo "SHA256=${SHA256}"

      - name: Prepare SSH for AUR push
        run: |
          set -euo pipefail

          echo "HOME=$HOME"
          id || true

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          # Write key
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

          # Write known_hosts (force correct location)
          ssh-keyscan -t rsa,ecdsa,ed25519 -H aur.archlinux.org > "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

          # Force ssh to use this key + known_hosts for AUR
          cat > "$HOME/.ssh/config" <<'EOF'
          Host aur.archlinux.org
            User aur
            HostName aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 "$HOME/.ssh/config"

          # Sanity check: show we have the host key entry
          ssh-keygen -F aur.archlinux.org || (echo "known_hosts missing entry!" && exit 1)

          # Optional: test handshake (won't open a shell; AUR typically disconnects, that's OK)
          ssh -o BatchMode=yes -T aur@aur.archlinux.org || true

      - name: Clone AUR repo
        env:
          GIT_SSH_COMMAND: ssh -F "$HOME/.ssh/config"
        run: |
          set -euo pipefail
          git clone "ssh://aur@aur.archlinux.org/${AUR_PKG}.git" aur

      - name: Update PKGBUILD + regenerate .SRCINFO
        working-directory: aur
        run: |
          set -euo pipefail

          sed -i -E \
            -e "s/^pkgver=.*/pkgver=${PKGVER}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums=.*/sha256sums=('${SHA256}')/" \
            PKGBUILD

          makepkg --printsrcinfo > .SRCINFO

          # Sanity check: .SRCINFO source should contain v${PKGVER} and the correct asset
          grep -q "source = https://github.com/.*/releases/download/v${PKGVER}/${LINUX_ASSET}" .SRCINFO

          git status --porcelain
          git diff -- PKGBUILD .SRCINFO || true

      - name: Commit and push to AUR
        working-directory: aur
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          git add PKGBUILD .SRCINFO

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update to ${PKGVER}"
          git push
