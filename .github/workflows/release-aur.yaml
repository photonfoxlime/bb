name: Release to AUR

on:
  workflow_run:
    workflows: ["Release"] # must match your cargo-dist workflow name exactly
    types: [completed]

permissions:
  contents: read

concurrency:
  group: aur-release
  cancel-in-progress: false

jobs:
  aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      REPO: photonfoxlime/bb
      AUR_PKGNAME: blooming-blockery-bin
      ASSET_NAME: blooming-blockery-x86_64-unknown-linux-gnu.tar.xz

    steps:
      - name: Checkout source repo (at the exact workflow_run commit)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine tag that points to this commit
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Prefer an annotated/regular tag that points exactly at this commit.
          TAG="$(git tag --points-at HEAD | head -n 1 || true)"
          if [[ -z "${TAG}" ]]; then
            echo "No git tag points at HEAD (${GITHUB_SHA})."
            echo "Make sure cargo-dist creates a tag (e.g. vX.Y.Z) on the commit it builds."
            exit 1
          fi

          # Expect tags like v0.0.5; strip leading v for pkgver
          PKGVER="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkgver=${PKGVER}" >> "$GITHUB_OUTPUT"

      - name: Download release asset and compute sha256
        id: sha
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          PKGVER="${{ steps.tag.outputs.pkgver }}"
          ASSET="${ASSET_NAME}"

          URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
          echo "Downloading: $URL"

          curl -fL --retry 5 --retry-delay 2 -o "$ASSET" "$URL"
          SHA="$(sha256sum "$ASSET" | awk '{print $1}')"

          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "pkgver=${PKGVER}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -t rsa,ecdsa,ed25519 -H aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            HostName aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ secrets.AUR_PKGNAME || env.AUR_PKGNAME }}"
          git clone "ssh://aur@aur.archlinux.org/${PKG}.git" aur

      - name: Update PKGBUILD (pkgver, pkgrel, source, sha256sums)
        shell: bash
        run: |
          set -euo pipefail

          PKGVER="${{ steps.sha.outputs.pkgver }}"
          URL="${{ steps.sha.outputs.url }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          cd aur
          test -f PKGBUILD

          sed -i -E "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i -E "s|^source=\(.*\)|source=(\"${URL}\")|" PKGBUILD
          sed -i -E "s/^sha256sums=\(.*/sha256sums=('${SHA}')/" PKGBUILD

      - name: Pre-create .SRCINFO (host)
        shell: bash
        run: |
          set -euo pipefail
          : > aur/.SRCINFO

      - name: Regenerate .SRCINFO (Arch container, non-root)
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: >-
            -v ${{ github.workspace }}/aur:/pkg
          run: |
            set -euo pipefail
            pacman -Sy --noconfirm --needed base-devel

            useradd -m builder

            # makepkg refuses root; run as builder
            su - builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'

      - name: Ensure aur/ is writable (safety)
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" aur
          chmod -R u+rwX aur

      - name: Commit & push to AUR (PKGBUILD + .SRCINFO)
        shell: bash
        env:
          GIT_AUTHOR_NAME: photonfoxlime-bot
          GIT_AUTHOR_EMAIL: ${{ secrets.AUR_EMAIL }}
          GIT_COMMITTER_NAME: photonfoxlime-bot
          GIT_COMMITTER_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          set -euo pipefail
          cd aur

          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.tag.outputs.tag }}"
          git push
