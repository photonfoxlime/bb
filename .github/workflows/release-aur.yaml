name: Release to AUR

on:
  workflow_run:
    workflows: ["Release"] # must match your cargo-dist workflow name exactly
    types: [completed]

permissions:
  contents: read

concurrency:
  group: aur-release
  cancel-in-progress: false

jobs:
  aur:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      REPO: photonfoxlime/bb
      AUR_PKGNAME: blooming-blockery-bin
      ASSET_NAME: blooming-blockery-x86_64-unknown-linux-gnu.tar.xz

    steps:
      - name: Checkout source repo (at the exact workflow_run commit)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Determine tag that points to this commit
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Prefer an annotated/regular tag that points exactly at this commit.
          TAG="$(git tag --points-at HEAD | head -n 1 || true)"
          if [[ -z "${TAG}" ]]; then
            echo "No git tag points at HEAD (${GITHUB_SHA})."
            echo "Make sure cargo-dist creates a tag (e.g. vX.Y.Z) on the commit it builds."
            exit 1
          fi

          # Expect tags like v0.0.5; strip leading v for pkgver
          PKGVER="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "pkgver=${PKGVER}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH for AUR
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -t rsa,ecdsa,ed25519 -H aur.archlinux.org >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            HostName aur.archlinux.org
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ secrets.AUR_PKGNAME || env.AUR_PKGNAME }}"
          git clone "ssh://aur@aur.archlinux.org/${PKG}.git" aur

      - name: Update PKGBUILD (pkgver, pkgrel, source)
        shell: bash
        run: |
          set -euo pipefail

          PKGVER="${{ steps.tag.outputs.pkgver }}"
          TAG="${{ steps.tag.outputs.tag }}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET_NAME}"

          cd aur
          sed -i -E "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          if grep -qE '^source_x86_64=' PKGBUILD; then
            sed -i -E "s|^source_x86_64=\(.*\)|source_x86_64=(\"${URL}\")|" PKGBUILD
          else
            sed -i -E "s|^source=\(.*\)|source=(\"${URL}\")|" PKGBUILD
          fi

      - name: Pre-create .SRCINFO (host)
        shell: bash
        run: |
          set -euo pipefail
          : > aur/.SRCINFO

      - name: Regenerate .SRCINFO (Arch container, match host UID/GID)
        uses: addnab/docker-run-action@v3
        with:
          image: archlinux:latest
          options: >-
            -v ${{ github.workspace }}/aur:/pkg
          run: |
            set -euo pipefail
            pacman -Sy --noconfirm --needed base-devel

            # Match the bind-mount owner from the host (GitHub runner)
            HOST_UID="$(stat -c '%u' /pkg)"
            HOST_GID="$(stat -c '%g' /pkg)"

            # Create group/user with matching ids (ignore if they already exist)
            getent group "$HOST_GID" >/dev/null || groupadd -g "$HOST_GID" hostgrp
            id -u hostuser >/dev/null 2>&1 || useradd -m -u "$HOST_UID" -g "$HOST_GID" hostuser

            # Ensure file exists; ownership becomes irrelevant once UID matches
            touch /pkg/.SRCINFO

            # Generate as the matched non-root user
            su - hostuser -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'

      - name: Commit & push to AUR (PKGBUILD + .SRCINFO)
        shell: bash
        env:
          GIT_AUTHOR_NAME: photonfoxlime-bot
          GIT_AUTHOR_EMAIL: ${{ secrets.AUR_EMAIL }}
          GIT_COMMITTER_NAME: photonfoxlime-bot
          GIT_COMMITTER_EMAIL: ${{ secrets.AUR_EMAIL }}
        run: |
          set -euo pipefail
          cd aur

          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.tag.outputs.tag }}"
          git push
