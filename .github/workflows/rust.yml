name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm binutils
    - name: Check format
      run: cargo fmt -- --check
    - name: Build
      run: cargo build
    - name: Test
      run: cargo test
