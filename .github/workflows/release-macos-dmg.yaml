name: Release macOS DMG

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  dmg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Compute tag/version
        shell: bash
        run: |
          set -euo pipefail
          echo "TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          echo "VERSION=${{ github.event.release.tag_name }}" | sed 's/^v//' | awk '{print "VERSION="$0}' >> "$GITHUB_ENV"

      - name: Build .app via cargo-bundle
        shell: bash
        run: |
          set -euo pipefail
          cargo bundle --release --format osx --bin blooming-blockery --target "${{ matrix.target }}"

          APP_PATH="$(ls -d target/${{ matrix.target }}/release/bundle/osx/*.app | head -n1)"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"
          echo "Bundled app: $APP_PATH"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail
          DMG_NAME="blooming-blockery-${VERSION}-${{ matrix.target }}.dmg"
          hdiutil create \
            -volname "Blooming Blockery" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$TAG" "$DMG_NAME" --clobber
