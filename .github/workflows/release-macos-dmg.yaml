name: Release macOS DMG

on:
  workflow_run:
    workflows: ["Release"] # must match your cargo-dist workflow name exactly
    types: [completed]

permissions:
  contents: write

jobs:
  dmg:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Compute tag/version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" | head -n 1)"
          if [[ -z "$TAG" ]]; then
            echo "No git tag points at commit ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          echo "Resolved TAG=$TAG"
          echo "Resolved VERSION=$VERSION"

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail
          cargo bundle --release --target "${{ matrix.target }}"

      - name: Prepare DMG paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="Blooming Blockery"
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/${APP_NAME}.app"
          DMG_NAME="blooming-blockery-${{ steps.meta.outputs.version }}-${{ matrix.target }}.dmg"

          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found: $APP_PATH"
            find target -maxdepth 6 -type d -name "*.app" || true
            exit 1
          fi

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        shell: bash
        run: |
          set -euo pipefail

          hdiutil create \
            -volname "Blooming Blockery" \
            -srcfolder "${{ steps.paths.outputs.app_path }}" \
            -ov \
            -format UDZO \
            "${{ steps.paths.outputs.dmg_name }}"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.paths.outputs.dmg_name }}" \
            --clobber
