name: Winget Update

on:
  workflow_run:
    workflows: ["Release"] # must match your cargo-dist workflow name
    types: [completed]

permissions:
  contents: read

jobs:
  winget:
    # Only run if the Release workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Install wingetcreate
        shell: pwsh
        run: winget install wingetcreate --accept-source-agreements --accept-package-agreements

      - name: Determine latest release tag
        id: rel
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $repo = "${{ github.repository }}"
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; "X-GitHub-Api-Version" = "2022-11-28" }
          $rel = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/latest"
          "tag_name=$($rel.tag_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Submit WinGet manifest update PR
        shell: pwsh
        env:
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          TAG: ${{ steps.rel.outputs.tag_name }}
        run: |
          if (-not $env:WINGET_GITHUB_TOKEN) { throw "Missing secret WINGET_GITHUB_TOKEN" }
          if (-not $env:TAG) { throw "Could not determine TAG" }

          $version = $env:TAG -replace '^v',''

          $msi = "blooming-blockery-x86_64-pc-windows-msvc.msi"
          $url = "https://github.com/${{ github.repository }}/releases/download/$env:TAG/$msi"

          wingetcreate update `
            --submit `
            --token $env:WINGET_GITHUB_TOKEN `
            --urls $url `
            --version $version `
            --prtitle "Update Miorin.BloomingBlockery to $version" `
            Miorin.BloomingBlockery
