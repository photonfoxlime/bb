name: Release MSI (cargo-wix)

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  actions: read

concurrency:
  group: wix-msi
  cancel-in-progress: false

jobs:
  wix:
    runs-on: windows-latest

    env:
      REPO: photonfoxlime/bb
      # if it's a workspace package, fill it here: e.g. blooming-blockery
      CARGO_PACKAGE: blooming-blockery
      # you want the MSI file name on the release asset (try to keep it consistent with the winget workflow)
      MSI_ASSET_NAME: blooming-blockery-x86_64-pc-windows-msvc.msi

    steps:
      - name: Checkout (at tag)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # cargo-wix requires WiX Toolset (candle/light).
      # Chocolatey is the most reliable on windows-latest runners.
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress

          # Add WiX bin folder to PATH for this job (handles common install locations)
          $candidates = @(
            "C:\Program Files (x86)\WiX Toolset v3.11\bin",
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.10\bin"
          )
          $wixBin = $candidates | Where-Object { Test-Path (Join-Path $_ "candle.exe") } | Select-Object -First 1
          if (-not $wixBin) {
            Write-Error "WiX bin folder not found (candle.exe missing)."
          }
          "Using WiX bin: $wixBin"
          $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Sanity check
          where.exe candle
          where.exe light

      - name: Install cargo-wix
        shell: pwsh
        run: |
          cargo install cargo-wix --locked

      - name: Build MSI
        shell: pwsh
        run: |
          # cargo-wix writes MSIs to target\wix\ by default
          cargo wix --package "${{ env.CARGO_PACKAGE }}" --target x86_64-pc-windows-msvc

      - name: Locate MSI and rename to desired asset name
        id: msi
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "target\wix" -Filter "*.msi" -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $msi) { throw "No MSI found under target\wix" }

          $out = Join-Path $PWD "${{ env.MSI_ASSET_NAME }}"
          Copy-Item $msi.FullName $out -Force

          "msi_path=$out" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "Found MSI: $($msi.FullName)"
          "Renamed  : $out"

      - name: Upload MSI to GitHub Release (for this tag)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"

          # Ensure the release exists (create if missing)
          $releaseCheck = gh release view $tag --repo "${{ env.REPO }}" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo "${{ env.REPO }}" --title $tag --generate-notes
          }

          gh release upload $tag "${{ steps.msi.outputs.msi_path }}" --repo "${{ env.REPO }}" --clobber
